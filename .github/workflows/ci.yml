name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # --ignore-scripts skips `postinstall` which runs prisma generate +
      # `playwright install chromium` (~250MB). Tests don't need either.
      - name: Install
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://crawlcomments.duckdns.org/api/v1
          VITE_WS_URL: https://crawlcomments.duckdns.org
